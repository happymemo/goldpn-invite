<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>황금비앤피 초대장</title>

<style>

  @font-face {
  font-family: 'omyu pretty';
  src: url('omyu pretty.ttf');
}

body {
  background-image: url('https://i.imgur.com/VOXYU9A.jpeg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed; /* 스크롤 시 고정 */
  margin: 0;
  font-family: 'omyu pretty', sans-serif;
  
  color: #333;
}

.section {
  background: rgba(255, 255, 255, 0.85);
  padding: 60px 20px;
  text-align: center;
  border: 2px solid #FFD1D1;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.text-box {
   animation: fadeUp 1s ease;}
  @keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
  display: inline-block;
  background: rgba(255, 191, 192, 0.8);
  padding: 15px 25px;
  border-radius: 16px;
  color: white;
  margin-top: 10px;
}

.info {
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  margin: 20px;
  padding: 30px 20px;
  line-height: 1.8;
}

h1 {
  font-size: 42px;
}

p {
  font-size: 20px;
  word-break: keep-all;
  line-height: 1.6;
}

</style>
</head>

<body>

<!-- 메인 -->
<div class="text-box">
  <h1>🌸 황금비앤피 봄 야유회 🌸</h1>
  <p>따뜻한 봄날,<br>소중한 분들을 초대합니다 😊</p>
</div>

<!-- 일정 안내 -->
<div class="section info">
  <h2>📍 일정 안내</h2>
  <p>📅 2026년 5월 1일 ~ 2일</p>
  <p>📌 장소 : 문경 최고의 장소</p>
</div>

<!-- 소개 -->
<div class="section">
  <p>
    황금비앤피가 준비한<br>
    특별한 봄 야유회에<br>
    함께해주시기를 바랍니다 🌿
  </p>
</div>

<!-- 마무리 -->
<div class="section">
  <p>
    귀한 시간을 내어 함께해주시면<br>
    진심으로 감사드리겠습니다 🙏
  </p>
</div>

</body>
</html>
